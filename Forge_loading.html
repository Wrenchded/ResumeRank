<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeRank AI | Initializing Forge AI</title>

    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Loader Core */
        .loader-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(79, 70, 229, 0.1);
            border-left-color: #7c3aed;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .pulse {
            position: absolute;
            width: 110px;
            height: 110px;
            background: rgba(124, 58, 237, 0.12);
            border-radius: 50%;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .text {
            margin-top: 30px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-align: center;
        }

        .subtext {
            color: #a78bfa;
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 500;
        }

        .system-log {
            margin-top: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #475569;
            text-align: center;
        }
    </style>

    <script>
        // 🔥 FORGE AI FORM LINK (replace this)
        const FORGE_FORM_URL = "https://forms.gle/FSPFSWex4ZykkiLP9";

        setTimeout(() => {
            window.location.replace(FORGE_FORM_URL);
        }, 2200);
    </script>
</head>

<body>

    <div class="loader-wrapper">
        <div class="pulse"></div>
        <div class="loader"></div>
    </div>

    <div class="text">FORGING YOUR CAREER PROFILE...</div>
    <div class="subtext">AI is structuring your resume for maximum impact</div>

    <div class="system-log">
        Initializing Forge Engine... [OK]<br>
        Connecting to AI Resume Pipeline... [ACTIVE]<br>
        Preparing ATS Optimization Layer... [READY]
    </div>

</body>
</html>
